# ─────────────────────────────────────────────────────────────
# CI/CD — Build & push images on PR, deploy on merge to main
# ─────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ananditawairya/ecom

jobs:
  # ── Build & Push ────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push auth-service
        run: |
          docker build -f auth-service/Dockerfile -t ${{ env.IMAGE_PREFIX }}-auth-service:${{ steps.tag.outputs.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-auth-service:${{ steps.tag.outputs.sha }}

      - name: Build & push product-service
        run: |
          docker build -f product-service/Dockerfile -t ${{ env.IMAGE_PREFIX }}-product-service:${{ steps.tag.outputs.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-product-service:${{ steps.tag.outputs.sha }}

      - name: Build & push order-service
        run: |
          docker build -f order-service/Dockerfile -t ${{ env.IMAGE_PREFIX }}-order-service:${{ steps.tag.outputs.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-order-service:${{ steps.tag.outputs.sha }}

      - name: Build & push ai-service
        run: |
          docker build -f ai-service/Dockerfile -t ${{ env.IMAGE_PREFIX }}-ai-service:${{ steps.tag.outputs.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-ai-service:${{ steps.tag.outputs.sha }}

      - name: Build & push graphql-gateway
        run: |
          docker build -f graphql-gateway/Dockerfile -t ${{ env.IMAGE_PREFIX }}-graphql-gateway:${{ steps.tag.outputs.sha }} .
          docker push ${{ env.IMAGE_PREFIX }}-graphql-gateway:${{ steps.tag.outputs.sha }}

      # On main: also tag as :latest so EC2 can always pull the newest
      - name: Tag as latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          services=(auth-service product-service order-service ai-service graphql-gateway)
          for svc in "${services[@]}"; do
            docker tag "${{ env.IMAGE_PREFIX }}-${svc}:${{ steps.tag.outputs.sha }}" "${{ env.IMAGE_PREFIX }}-${svc}:latest"
            docker push "${{ env.IMAGE_PREFIX }}-${svc}:latest"
          done

      - name: Verify images
        run: |
          echo "✅ All images built and pushed successfully"
          docker images --filter "reference=${{ env.IMAGE_PREFIX }}-*" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ── Deploy ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-ec2
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/ecom/app

            # Authenticate with GHCR so docker compose pull works
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u ananditawairya --password-stdin

            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}'
            export INTERNAL_JWT_SECRET='${{ secrets.INTERNAL_JWT_SECRET }}'
            export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
            export MEILI_MASTER_KEY='${{ secrets.MEILI_MASTER_KEY }}'
            export PRODUCT_SEARCH_ENGINE_ENABLED='${{ vars.PRODUCT_SEARCH_ENGINE_ENABLED || 'true' }}'
            export SEARCH_SEMANTIC_ENABLED='${{ vars.SEARCH_SEMANTIC_ENABLED || 'true' }}'
            export OLLAMA_EMBED_MODEL='${{ vars.OLLAMA_EMBED_MODEL || 'embeddinggemma' }}'
            export DEPLOY_BRANCH='${{ github.ref_name }}'
            export DEPLOY_COMMIT_SHA='${{ github.sha }}'
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh --skip-build
