# ─────────────────────────────────────────────────────────────
# CI/CD — Build on push/PR, deploy on main after build succeeds
# ─────────────────────────────────────────────────────────────
name: CI — Build

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build auth-service
        run: docker build -f auth-service/Dockerfile -t ecom/auth-service:ci .

      - name: Build product-service
        run: docker build -f product-service/Dockerfile -t ecom/product-service:ci .

      - name: Build order-service
        run: docker build -f order-service/Dockerfile -t ecom/order-service:ci .

      - name: Build ai-service
        run: docker build -f ai-service/Dockerfile -t ecom/ai-service:ci .

      - name: Build graphql-gateway
        run: docker build -f graphql-gateway/Dockerfile -t ecom/graphql-gateway:ci .

      - name: Verify images
        run: |
          echo "✅ All images built successfully"
          docker images --filter "reference=ecom/*" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-ec2
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/ecom/app
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}'
            export INTERNAL_JWT_SECRET='${{ secrets.INTERNAL_JWT_SECRET }}'
            export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
            export MEILI_MASTER_KEY='${{ secrets.MEILI_MASTER_KEY }}'
            export PRODUCT_SEARCH_ENGINE_ENABLED='${{ vars.PRODUCT_SEARCH_ENGINE_ENABLED || 'true' }}'
            export SEARCH_SEMANTIC_ENABLED='${{ vars.SEARCH_SEMANTIC_ENABLED || 'true' }}'
            export OLLAMA_EMBED_MODEL='${{ vars.OLLAMA_EMBED_MODEL || 'embeddinggemma' }}'
            export DEPLOY_BRANCH='${{ github.ref_name }}'
            export DEPLOY_COMMIT_SHA='${{ github.sha }}'
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
