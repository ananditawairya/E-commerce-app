# ─────────────────────────────────────────────────────────────
# CD — Deploy to EC2 via SSH (manual only)
# ─────────────────────────────────────────────────────────────
name: CD — Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip Docker build (pull pre-built images from GHCR)"
        required: false
        default: "true"
        type: boolean
      seed_db:
        description: "Seed product database after deploy"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/ecom/app

            # Authenticate with GHCR so docker compose pull works
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u ananditawairya --password-stdin

            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}'
            export INTERNAL_JWT_SECRET='${{ secrets.INTERNAL_JWT_SECRET }}'
            export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'
            export MEILI_MASTER_KEY='${{ secrets.MEILI_MASTER_KEY }}'
            export PRODUCT_SEARCH_ENGINE_ENABLED='${{ vars.PRODUCT_SEARCH_ENGINE_ENABLED || 'true' }}'
            export SEARCH_SEMANTIC_ENABLED='${{ vars.SEARCH_SEMANTIC_ENABLED || 'true' }}'
            export OLLAMA_EMBED_MODEL='${{ vars.OLLAMA_EMBED_MODEL || 'embeddinggemma' }}'
            export DEPLOY_BRANCH='${{ github.ref_name }}'
            export DEPLOY_COMMIT_SHA='${{ github.sha }}'
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh ${{ github.event_name == 'workflow_dispatch' && inputs.skip_build == true && '--skip-build' || '' }} ${{ github.event_name == 'workflow_dispatch' && inputs.seed_db == true && '--seed' || '' }}
